services:
  - type: web
    name: scb-mcp
    runtime: docker
    dockerfilePath: ./mcp-tools/scb-mcp/Dockerfile
    dockerContext: ./mcp-tools/scb-mcp
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
