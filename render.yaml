services:
  - type: web
    name: scb-mcp
    runtime: docker
    dockerfilePath: ./mcp-tools/combined-mcp/Dockerfile
    dockerContext: ./mcp-tools
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRAFIKVERKET_API_KEY
        sync: false
      - key: RIKSBANK_API_KEY
        sync: false
      - key: BOLAGSVERKET_CLIENT_ID
        sync: false
      - key: BOLAGSVERKET_CLIENT_SECRET
        sync: false
