# DeerFlow Configuration - LM Studio (Local LLM)
#
# This configuration connects DeerFlow to a local LM Studio instance
# running Nemotron 3 Nano at http://192.168.50.170:8000
#
# LM Studio exposes an OpenAI-compatible API, so we use langchain_openai:ChatOpenAI

models:
  - name: nemotron-3-nano
    display_name: Nemotron 3 Nano (LM Studio)
    use: langchain_openai:ChatOpenAI
    model: nvidia/nemotron-3-nano
    base_url: http://192.168.50.170:8000/v1
    api_key: lm-studio
    max_tokens: 4096
    temperature: 0.7
    supports_thinking: true
    supports_vision: false
    supports_reasoning_effort: false

# ============================================================================
# Tool Groups Configuration
# ============================================================================
tool_groups:
  - name: web
  - name: file:read
  - name: file:write
  - name: bash

# ============================================================================
# Tools Configuration
# ============================================================================
tools:
  # Web search tool (requires Tavily API key)
  - name: web_search
    group: web
    use: src.community.tavily.tools:web_search_tool
    max_results: 5

  # Web fetch tool (uses Jina AI reader)
  - name: web_fetch
    group: web
    use: src.community.jina_ai.tools:web_fetch_tool
    timeout: 10

  # Alternative: Lightpanda-based tools (no API key, full JS rendering, requires Lightpanda running)
  # - name: web_search
  #   group: web
  #   use: src.community.lightpanda.tools:web_search_tool
  #   max_results: 5
  #   timeout: 30
  # - name: web_fetch
  #   group: web
  #   use: src.community.lightpanda.tools:web_fetch_tool
  #   timeout: 30
  #   use_cdp: false

  # Image search tool (uses DuckDuckGo)
  - name: image_search
    group: web
    use: src.community.image_search.tools:image_search_tool
    max_results: 5

  # File operations tools
  - name: ls
    group: file:read
    use: src.sandbox.tools:ls_tool

  - name: read_file
    group: file:read
    use: src.sandbox.tools:read_file_tool

  - name: write_file
    group: file:write
    use: src.sandbox.tools:write_file_tool

  - name: str_replace
    group: file:write
    use: src.sandbox.tools:str_replace_tool

  # Bash execution tool
  - name: bash
    group: bash
    use: src.sandbox.tools:bash_tool

# ============================================================================
# Sandbox Configuration
# ============================================================================
sandbox:
  use: src.sandbox.local:LocalSandboxProvider

# ============================================================================
# Skills Configuration
# ============================================================================
skills:
  container_path: /mnt/skills

# ============================================================================
# Title Generation Configuration
# ============================================================================
title:
  enabled: true
  max_words: 6
  max_chars: 60
  model_name: null

# ============================================================================
# Summarization Configuration
# ============================================================================
summarization:
  enabled: true
  model_name: null
  trigger:
    - type: tokens
      value: 15564
  keep:
    type: messages
    value: 10
  trim_tokens_to_summarize: 15564
  summary_prompt: null

# ============================================================================
# Memory Configuration
# ============================================================================
memory:
  enabled: true
  storage_path: memory.json
  debounce_seconds: 30
  model_name: null
  max_facts: 100
  fact_confidence_threshold: 0.7
  injection_enabled: true
  max_injection_tokens: 2000

# ============================================================================
# Checkpointer Configuration
# ============================================================================
checkpointer:
  type: sqlite
  connection_string: checkpoints.db
