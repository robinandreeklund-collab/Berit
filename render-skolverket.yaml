services:
  - type: web
    name: skolverket-mcp
    runtime: docker
    dockerfilePath: ./mcp-tools/skolverket-mcp/Dockerfile
    dockerContext: ./mcp-tools/skolverket-mcp
    region: frankfurt
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: info
      - key: SKOLVERKET_API_TIMEOUT_MS
        value: "30000"
      - key: SKOLVERKET_MAX_RETRIES
        value: "3"
