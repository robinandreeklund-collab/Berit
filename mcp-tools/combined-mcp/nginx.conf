worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;

    # Skolverket MCP — /skolverket/* → port 3002
    upstream skolverket {
        server 127.0.0.1:3002;
    }

    # Trafikverket MCP — /trafikverket/* → port 3003
    upstream trafikverket {
        server 127.0.0.1:3003;
    }

    # Riksbank MCP — /riksbank/* → port 3004
    upstream riksbank {
        server 127.0.0.1:3004;
    }

    # SMHI MCP — /smhi/* → port 3005
    upstream smhi {
        server 127.0.0.1:3005;
    }

    # Elpris MCP — /elpris/* → port 3006
    upstream elpris {
        server 127.0.0.1:3006;
    }

    # Bolagsverket MCP — /bolagsverket/* → port 3007
    upstream bolagsverket {
        server 127.0.0.1:3007;
    }

    # Google Maps MCP — /google-maps/* → port 3008
    upstream google-maps {
        server 127.0.0.1:3008;
    }

    # Blocket/Tradera MCP — /blocket-tradera/* → port 3009
    upstream blocket-tradera {
        server 127.0.0.1:3009;
    }

    # Riksdag MCP — /riksdag/* → port 3010
    upstream riksdag {
        server 127.0.0.1:3010;
    }

    # NVV MCP — /nvv/* → port 3011
    upstream nvv {
        server 127.0.0.1:3011;
    }

    # Kolada MCP — /kolada/* → port 3012
    upstream kolada {
        server 127.0.0.1:3012;
    }

    # KB MCP — /kb/* → port 3013
    upstream kb {
        server 127.0.0.1:3013;
    }

    # Upphandlingsdata MCP — /upphandlingsdata/* → port 3014
    upstream upphandlingsdata {
        server 127.0.0.1:3014;
    }

    # OECD MCP — /oecd/* → port 3015
    upstream oecd {
        server 127.0.0.1:3015;
    }

    # Trafikanalys MCP — /trafikanalys/* → port 3016
    upstream trafikanalys {
        server 127.0.0.1:3016;
    }

    # Visit Sweden MCP — /visitsweden/* → port 3017
    upstream visitsweden {
        server 127.0.0.1:3017;
    }

    # Krisinformation MCP — /krisinformation/* → port 3018
    upstream krisinformation {
        server 127.0.0.1:3018;
    }

    # Polisen MCP — /polisen/* → port 3019
    upstream polisen {
        server 127.0.0.1:3019;
    }

    # SCB MCP — everything else → port 3001
    upstream scb {
        server 127.0.0.1:3001;
    }

    server {
        listen ${PORT} default_server;

        # Combined health check
        location = /health {
            proxy_pass http://scb/health;
        }

        # Skolverket routes — strip /skolverket prefix
        location /skolverket/ {
            proxy_pass http://skolverket/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            # SSE/streaming support
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Trafikverket routes — strip /trafikverket prefix
        location /trafikverket/ {
            proxy_pass http://trafikverket/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Riksbank routes — strip /riksbank prefix
        location /riksbank/ {
            proxy_pass http://riksbank/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # SMHI routes — strip /smhi prefix
        location /smhi/ {
            proxy_pass http://smhi/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
