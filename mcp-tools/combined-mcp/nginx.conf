worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;

    # Skolverket MCP — /skolverket/* → port 3002
    upstream skolverket {
        server 127.0.0.1:3002;
    }

    # Trafikverket MCP — /trafikverket/* → port 3003
    upstream trafikverket {
        server 127.0.0.1:3003;
    }

    # Riksbank MCP — /riksbank/* → port 3004
    upstream riksbank {
        server 127.0.0.1:3004;
    }

    # SCB MCP — everything else → port 3001
    upstream scb {
        server 127.0.0.1:3001;
    }

    server {
        listen ${PORT} default_server;

        # Combined health check
        location = /health {
            proxy_pass http://scb/health;
        }

        # Skolverket routes — strip /skolverket prefix
        location /skolverket/ {
            proxy_pass http://skolverket/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            # SSE/streaming support
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Trafikverket routes — strip /trafikverket prefix
        location /trafikverket/ {
            proxy_pass http://trafikverket/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Riksbank routes — strip /riksbank prefix
        location /riksbank/ {
            proxy_pass http://riksbank/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # SCB — default, backwards compatible (keeps /mcp, /health, / etc.)
        location / {
            proxy_pass http://scb;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
