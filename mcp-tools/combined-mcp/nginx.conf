worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    access_log /dev/stdout;

    # Skolverket MCP — /skolverket/* → port 3002
    upstream skolverket {
        server 127.0.0.1:3002;
    }

    # Trafikverket MCP — /trafikverket/* → port 3003
    upstream trafikverket {
        server 127.0.0.1:3003;
    }

    # Riksbank MCP — /riksbank/* → port 3004
    upstream riksbank {
        server 127.0.0.1:3004;
    }

    # SMHI MCP — /smhi/* → port 3005
    upstream smhi {
        server 127.0.0.1:3005;
    }

    # Lightpanda MCP — /lightpanda/* → port 3006
    upstream lightpanda {
        server 127.0.0.1:3006;
    }

    # Elpris MCP — /elpris/* → port 3007
    upstream elpris {
        server 127.0.0.1:3007;
    }

    # Bolagsverket MCP — /bolagsverket/* → port 3008
    upstream bolagsverket {
        server 127.0.0.1:3008;
    }

    # Google Maps MCP — /google-maps/* → port 3009
    upstream google-maps {
        server 127.0.0.1:3009;
    }

    # Blocket/Tradera MCP — /blocket-tradera/* → port 3010
    upstream blocket-tradera {
        server 127.0.0.1:3010;
    }

    # Riksdag MCP — /riksdag/* → port 3011
    upstream riksdag {
        server 127.0.0.1:3011;
    }

    # NVV MCP — /nvv/* → port 3012
    upstream nvv {
        server 127.0.0.1:3012;
    }

    # Kolada MCP — /kolada/* → port 3013
    upstream kolada {
        server 127.0.0.1:3013;
    }

    # SCB MCP — everything else → port 3001
    upstream scb {
        server 127.0.0.1:3001;
    }

    server {
        listen ${PORT} default_server;

        # Combined health check
        location = /health {
            proxy_pass http://scb/health;
        }

        # Skolverket routes — strip /skolverket prefix
        location /skolverket/ {
            proxy_pass http://skolverket/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            # SSE/streaming support
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Trafikverket routes — strip /trafikverket prefix
        location /trafikverket/ {
            proxy_pass http://trafikverket/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Riksbank routes — strip /riksbank prefix
        location /riksbank/ {
            proxy_pass http://riksbank/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # SMHI routes — strip /smhi prefix
        location /smhi/ {
            proxy_pass http://smhi/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Lightpanda routes — strip /lightpanda prefix
        location /lightpanda/ {
            proxy_pass http://lightpanda/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Elpris routes — strip /elpris prefix
        location /elpris/ {
            proxy_pass http://elpris/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Bolagsverket routes — strip /bolagsverket prefix
        location /bolagsverket/ {
            proxy_pass http://bolagsverket/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Google Maps routes — strip /google-maps prefix
        location /google-maps/ {
            proxy_pass http://google-maps/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Blocket/Tradera routes — strip /blocket-tradera prefix
        location /blocket-tradera/ {
            proxy_pass http://blocket-tradera/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Riksdag routes — strip /riksdag prefix
        location /riksdag/ {
            proxy_pass http://riksdag/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # NVV routes — strip /nvv prefix
        location /nvv/ {
            proxy_pass http://nvv/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # Kolada routes — strip /kolada prefix
        location /kolada/ {
            proxy_pass http://kolada/;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }

        # SCB — default, backwards compatible (keeps /mcp, /health, / etc.)
        location / {
            proxy_pass http://scb;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }
}
